<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YALLDAR — Live Weather Radar</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
/* ── Reset ── */
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#090c12}

/* ── Type tokens ── */
/* Display: Arial Black (bold warnings) */
/* Mono: Consolas/Courier (radar data) */
/* Body: system-ui (controls) */

/* ── Loader ── */
#loader{
  position:fixed;inset:0;background:#090c12;
  z-index:9999;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:18px;
  transition:opacity .5s;
}
#loader h1{
  font-family:'Arial Black','Segoe UI Black',sans-serif;
  font-size:52px;font-weight:900;letter-spacing:8px;
  color:#fff;
}
#loader h1 em{font-style:normal;color:#00e5ff}
#loader-sub{
  font-family:'Consolas','Courier New',monospace;
  font-size:12px;letter-spacing:3px;color:#3a4050;
  text-transform:uppercase;
}
.ring{
  width:42px;height:42px;
  border:3px solid #1a1f2c;
  border-top-color:#00e5ff;
  border-radius:50%;
  animation:spin .75s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── Header bar (exact match to screenshots) ── */
#hdr{
  position:absolute;top:0;left:0;right:0;height:34px;
  z-index:800;
  background:rgba(6,8,14,.96);
  border-bottom:1px solid #1c2030;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 16px;gap:12px;
  font-family:'Consolas','Courier New',monospace;font-size:12px;
}
.hi{display:flex;align-items:center;gap:6px;white-space:nowrap}
.hl{color:#3d4a60}
.hv{color:#e4eaf4;font-weight:700}
.hv.live{color:#00e5ff}

/* ── Map ── */
#map{
  position:absolute;top:34px;left:0;right:0;bottom:0;
  background:#090c12;
}

/* ── Warning card ── */
#wcard{
  position:absolute;top:44px;left:10px;
  z-index:700;width:330px;
  filter:drop-shadow(0 4px 16px rgba(0,0,0,.7));
}
.wc-title{
  font-family:'Arial Black','Segoe UI Black',sans-serif;
  font-size:20px;font-weight:900;letter-spacing:1.5px;
  padding:9px 14px;color:#fff;text-transform:uppercase;
  border-bottom:2px solid rgba(255,255,255,.12);
}
.wc-body{
  padding:8px 14px 11px;
  font-family:'Consolas','Courier New',monospace;
}
.wc-row{font-size:13px;font-weight:700;padding:2px 0;letter-spacing:.3px}
.wc-row b{color:#999;font-weight:400}
.wc-foot{
  display:flex;gap:8px;align-items:center;margin-top:8px;
  font-size:11px;
}
.wc-foot button{
  background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);
  color:#fff;font-weight:700;font-size:14px;
  width:26px;height:22px;cursor:pointer;border-radius:2px;
  display:flex;align-items:center;justify-content:center;
  transition:background .15s;
}
.wc-foot button:hover{background:rgba(255,255,255,.22)}
.wc-foot span{color:#888;font-family:'Consolas',monospace;font-size:11px}

/* Warning type palettes */
.wt-tor   {background:#c00000}
.wt-tow   {background:#dd7700;color:#fff}
.wt-svr   {background:#cc5500}
.wt-svw   {background:#bb8800}
.wt-ffw   {background:#007a00}
.wt-ffa   {background:#005500}
.wt-fly   {background:#006600}
.wt-win   {background:#334cb5}
.wt-hur   {background:#8800aa}
.wt-fire  {background:#994400}
.wt-def   {background:#1e2535}

/* body bg for warning cards */
.wb-tor   {background:#1a0000;color:#ff8888}
.wb-tow   {background:#1c1000;color:#ffcc88}
.wb-svr   {background:#1a0a00;color:#ffaa66}
.wb-svw   {background:#1a1400;color:#ffdd88}
.wb-ffw   {background:#001200;color:#88ff99}
.wb-ffa   {background:#000e00;color:#77ee88}
.wb-fly   {background:#001000;color:#66cc77}
.wb-win   {background:#080d20;color:#aabbff}
.wb-hur   {background:#0e0015;color:#dd99ff}
.wb-fire  {background:#120600;color:#ffaa66}
.wb-def   {background:#0e1120;color:#99aacc}

/* ── Warning list (right) ── */
#wlist{
  position:absolute;top:44px;right:10px;
  z-index:700;
  max-height:calc(100% - 90px);
  width:230px;
  overflow-y:auto;
  display:flex;flex-direction:column;gap:3px;
  scrollbar-width:thin;scrollbar-color:#1e2535 transparent;
}
#wlist::-webkit-scrollbar{width:3px}
#wlist::-webkit-scrollbar-thumb{background:#222}

.wi{
  padding:5px 10px 5px 12px;
  font-family:'Segoe UI','Arial',sans-serif;
  font-size:11px;font-weight:700;
  color:#fff;cursor:pointer;
  letter-spacing:.5px;text-transform:uppercase;
  opacity:.75;transition:opacity .15s;
  border-left:3px solid transparent;
  display:flex;justify-content:space-between;align-items:center;
}
.wi:hover{opacity:.95}
.wi.sel{opacity:1;border-left-color:rgba(255,255,255,.6)}
.wi-cnt{
  background:rgba(255,255,255,.15);border-radius:10px;
  padding:1px 6px;font-size:10px;min-width:20px;text-align:center;
}

/* ── Bottom controls ── */
#ctls{
  position:absolute;bottom:18px;left:50%;transform:translateX(-50%);
  z-index:700;display:flex;gap:7px;align-items:center;
}
.cb{
  background:rgba(9,12,18,.88);
  color:#aab4c8;
  border:1px solid #1e2535;
  padding:7px 14px;font-size:12px;font-weight:600;
  letter-spacing:.4px;cursor:pointer;border-radius:3px;
  transition:all .15s;white-space:nowrap;
  font-family:'Segoe UI','Arial',sans-serif;
}
.cb:hover{background:rgba(20,25,38,.95);color:#dde4f0;border-color:#2e3a50}
.cb.on{
  background:rgba(200,50,0,.8);
  border-color:#ff4400;color:#fff;
}
@keyframes pulse-border{
  0%,100%{border-color:#ff4400}
  50%{border-color:#ffaa00;box-shadow:0 0 10px rgba(255,80,0,.4)}
}
.cb.on{animation:pulse-border 1.8s ease infinite}

/* ── dBZ legend ── */
#leg{
  position:absolute;bottom:57px;left:50%;transform:translateX(-50%);
  z-index:700;
  background:rgba(9,12,18,.85);padding:5px 14px 8px;
  border-radius:3px;border:1px solid #1c2030;
}
.lt{font-size:9px;color:#3d4a60;letter-spacing:2px;text-transform:uppercase;margin-bottom:4px;text-align:center}
.lb{
  width:220px;height:13px;border-radius:2px;
  background:linear-gradient(to right,
    transparent 0%,#04e9e7 6%,#019ff4 14%,#0300f4 20%,
    #02fd02 27%,#01c501 33%,#008e00 39%,
    #fdf802 46%,#e5bc00 52%,#fd9500 58%,
    #fd0000 65%,#d40000 72%,#bc0000 78%,
    #f800fd 87%,#9854c6 95%);
}
.ll{
  display:flex;justify-content:space-between;
  font-size:9px;color:#3d4a60;margin-top:2px;width:220px;
}

/* Leaflet overrides */
.leaflet-control-attribution{
  background:rgba(0,0,0,.7)!important;color:#333!important;font-size:9px!important;
}
.leaflet-control-attribution a{color:#444!important}
.leaflet-control-zoom a{
  background:rgba(9,12,18,.9)!important;color:#667!important;
  border-color:#1e2535!important;
}
.leaflet-control-zoom a:hover{background:rgba(20,25,38,.95)!important;color:#aab4c8!important}
</style>
</head>
<body>

<div id="loader">
  <h1>Y<em>ALL</em>DAR</h1>
  <div class="ring"></div>
  <div id="loader-sub">Initializing radar...</div>
</div>

<div id="hdr">
  <div class="hi"><span class="hl">Current Frame:</span><span class="hv live" id="h-frame">--</span></div>
  <div class="hi"><span class="hl">Latest Scan:</span><span class="hv" id="h-scan">--</span></div>
  <div class="hi"><span class="hl">Source:</span><span class="hv" id="h-src">MRMS</span></div>
  <div class="hi"><span class="hl">Zoom:</span><span class="hv" id="h-zoom">4.00</span></div>
  <div class="hi"><span class="hl">Current Region:</span><span class="hv" id="h-region">National</span></div>
</div>

<div id="map"></div>
<div id="wcard"></div>
<div id="wlist"></div>

<div id="leg">
  <div class="lt">Radar Reflectivity — dBZ</div>
  <div class="lb"></div>
  <div class="ll"><span>0</span><span>20</span><span>35</span><span>50</span><span>65+</span></div>
</div>

<div id="ctls">
  <button class="cb" onclick="App.go('nat')">🌐 National</button>
  <button class="cb" onclick="App.go('cen')">🌪 Central</button>
  <button class="cb" onclick="App.go('sth')">🌧 South</button>
  <button class="cb" onclick="App.go('nrth')">❄ North</button>
  <button class="cb" id="tbtn" onclick="App.toggleTour()">▶ Warning Tour</button>
  <button class="cb" onclick="App.refresh()">⟳ Refresh</button>
</div>

<script>
/* ══════════════════════════════════════════
   YALLDAR — Web Edition
   Data: RainViewer (radar) + NWS API (warnings)
   ══════════════════════════════════════════ */

const App = {
  map: null,
  rLayers: [],
  wLayers: [],
  warnings: [],
  idx: 0,
  tourOn: false,
  tourTimer: null,

  async init() {
    setMsg('Connecting to radar network...');

    // ── Leaflet map ──
    this.map = L.map('map', {
      center: [38, -96], zoom: 4,
      zoomControl: false, minZoom: 3, maxZoom: 14,
      attributionControl: true
    });

    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
      attribution: '© OpenStreetMap © CARTO',
      subdomains: 'abcd', maxZoom: 19
    }).addTo(this.map);

    L.control.zoom({ position: 'bottomright' }).addTo(this.map);
    this.map.on('zoomend moveend', () => this.syncHdr());

    setMsg('Fetching radar data...');
    await this.loadRadar();

    setMsg('Loading NWS warnings...');
    await this.loadWarnings();

    this.syncHdr();

    // Fade out loader
    const ld = document.getElementById('loader');
    ld.style.opacity = '0';
    setTimeout(() => ld.style.display = 'none', 500);

    // Auto-refresh every 3 min
    setInterval(() => this.refresh(), 3 * 60 * 1000);
  },

  /* ── RADAR ── */
  async loadRadar() {
    try {
      const r = await fetch('https://api.rainviewer.com/public/weather-maps.json');
      const d = await r.json();
      const past = d.radar?.past || [];
      if (!past.length) return;

      const latest = past[past.length - 1];
      this.paintRadar(latest.time);

      const t = new Date(latest.time * 1000);
      const fmt = t => t.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',timeZoneName:'short'});
      document.getElementById('h-frame').textContent = fmt(t);
      document.getElementById('h-scan').textContent = fmt(t);
    } catch(e) { console.warn('Radar fetch failed', e) }
  },

  paintRadar(ts, opacity = 0.72) {
    this.rLayers.forEach(l => this.map.removeLayer(l));
    this.rLayers = [];
    // Color 6 = TWC-style smooth rainbow scale
    const url = `https://tilecache.rainviewer.com/v2/radar/${ts}/512/{z}/{x}/{y}/6/1_1.png`;
    const tl = L.tileLayer(url, { opacity, zIndex: 3, maxZoom: 14 });
    tl.addTo(this.map);
    this.rLayers.push(tl);
  },

  /* ── WARNINGS ── */
  async loadWarnings() {
    try {
      const r = await fetch('https://api.weather.gov/alerts/active?status=actual&message_type=alert&limit=500');
      const d = await r.json();

      this.wLayers.forEach(l => l && this.map.removeLayer(l));
      this.wLayers = [];
      this.warnings = [];

      if (!d.features?.length) {
        this.renderCard(null);
        this.renderList();
        return;
      }

      // Priority order for sorting
      const PRI = [
        'Tornado Warning','Tornado Watch',
        'Severe Thunderstorm Warning','Severe Thunderstorm Watch',
        'Flash Flood Warning','Flash Flood Watch',
        'Flood Warning','Flood Watch',
        'Hurricane Warning','Hurricane Watch',
        'Winter Storm Warning','Blizzard Warning',
        'Winter Storm Watch','Ice Storm Warning',
        'High Wind Warning','Red Flag Warning',
        'Fire Weather Watch',
      ];

      this.warnings = d.features
        .filter(f => PRI.some(p => (f.properties.event||'').includes(p.split(' ')[0])))
        .sort((a,b) => {
          const ai = PRI.findIndex(p => (a.properties.event||'').includes(p.split(' ')[0]));
          const bi = PRI.findIndex(p => (b.properties.event||'').includes(p.split(' ')[0]));
          const av = ai === -1 ? 99 : ai;
          const bv = bi === -1 ? 99 : bi;
          return av - bv;
        })
        .slice(0, 80);

      // Draw polygons
      this.warnings.forEach((w, i) => {
        if (!w.geometry) { this.wLayers.push(null); return; }
        const c = wColor(w.properties.event);
        try {
          const gl = L.geoJSON(w.geometry, {
            style: { color: c, weight: 1.5, fillColor: c, fillOpacity: 0.13, opacity: .85 }
          });
          gl.on('click', () => this.pick(i));
          gl.addTo(this.map);
          this.wLayers.push(gl);
        } catch(e) { this.wLayers.push(null) }
      });

      this.renderList();
      if (this.warnings.length) this.pick(0);

    } catch(e) { console.warn('Warnings fetch failed', e) }
  },

  pick(i) {
    if (i < 0 || i >= this.warnings.length) return;
    this.idx = i;
    const w = this.warnings[i];
    const p = w.properties;

    this.renderCard(p, i);

    // Zoom to polygon
    const gl = this.wLayers[i];
    if (gl) {
      try {
        const b = gl.getBounds();
        if (b.isValid()) this.map.fitBounds(b, { padding: [60, 60], maxZoom: 10 });
      } catch(e) {}
    }

    // Infer state
    const area = p.areaDesc || '';
    const m = area.match(/,\s*([A-Z]{2})(\s|;|$)/);
    document.getElementById('h-region').textContent = m ? m[1] : area.split(',')[0].trim().substring(0,15) || 'Unknown';

    document.querySelectorAll('.wi').forEach(el =>
      el.classList.toggle('sel', +el.dataset.i === i));
  },

  renderCard(p, i) {
    const card = document.getElementById('wcard');
    if (!p) {
      card.innerHTML = `
        <div style="background:rgba(9,12,18,.9);border:1px solid #1c2030;padding:12px 16px;">
          <span style="color:#3d4a60;font-family:Consolas,monospace;font-size:13px;">No active warnings</span>
        </div>`;
      return;
    }

    const evt = p.event || 'Weather Alert';
    const areas = (p.areaDesc || '').substring(0, 60) + ((p.areaDesc||'').length > 60 ? '…' : '');
    const src = (p.senderName || 'NWS').replace('National Weather Service ','NWS ').substring(0,28);
    let exp = 'UNKNOWN';
    if (p.expires) {
      const diff = new Date(p.expires) - Date.now();
      if (diff > 0) {
        const h = Math.floor(diff/3.6e6), m = Math.floor((diff%3.6e6)/6e4);
        exp = h > 0 ? `${h}H ${m}M FROM NOW` : `${m}M FROM NOW`;
      } else exp = 'EXPIRED';
    }

    const tc = wTitleClass(evt), bc = wBodyClass(evt);
    const total = this.warnings.length;
    card.innerHTML = `
      <div class="wc-title ${tc}">${evt.toUpperCase()}</div>
      <div class="wc-body ${bc}">
        <div class="wc-row"><b>SOURCE: </b>${src}</div>
        <div class="wc-row"><b>AREAS: &nbsp;</b>${areas}</div>
        <div class="wc-row"><b>EXPIRES:</b> ${exp}</div>
        <div class="wc-foot">
          <button onclick="App.prev()">‹</button>
          <button onclick="App.next()">›</button>
          <span>${i+1} / ${total} warning${total!==1?'s':''}</span>
        </div>
      </div>`;
  },

  renderList() {
    const el = document.getElementById('wlist');
    if (!this.warnings.length) { el.innerHTML=''; return; }

    // Group by event
    const groups = {};
    this.warnings.forEach((w, i) => {
      const ev = w.properties.event || 'Unknown';
      if (!groups[ev]) groups[ev] = { first: i, n: 0 };
      groups[ev].n++;
    });

    el.innerHTML = Object.entries(groups).map(([ev, g]) =>
      `<div class="wi ${wTitleClass(ev)}" data-i="${g.first}" onclick="App.pick(${g.first})">
        <span>${ev.toUpperCase()}</span>
        <span class="wi-cnt">${g.n}</span>
      </div>`
    ).join('');
  },

  prev() { this.pick(this.idx > 0 ? this.idx - 1 : this.warnings.length - 1) },
  next() { this.pick((this.idx + 1) % this.warnings.length) },

  toggleTour() { this.tourOn ? this.stopTour() : this.startTour() },
  startTour() {
    if (!this.warnings.length) return;
    this.tourOn = true;
    const btn = document.getElementById('tbtn');
    btn.textContent = '⏹ Stop Tour';
    btn.classList.add('on');
    this.idx = 0; this.pick(0);
    this.tourTimer = setInterval(() => this.next(), 4000);
  },
  stopTour() {
    this.tourOn = false;
    clearInterval(this.tourTimer);
    const btn = document.getElementById('tbtn');
    btn.textContent = '▶ Warning Tour';
    btn.classList.remove('on');
  },

  go(region) {
    this.stopTour();
    const views = {
      nat:  [[38,-96],4],
      cen:  [[37,-98],6],
      sth:  [[31,-97],6],
      nrth: [[46,-98],5],
    };
    const [c,z] = views[region]||views.nat;
    this.map.setView(c,z);
    document.getElementById('h-region').textContent =
      {nat:'National',cen:'Central',sth:'South',nrth:'North'}[region];
  },

  async refresh() {
    await Promise.all([this.loadRadar(), this.loadWarnings()]);
  },

  syncHdr() {
    document.getElementById('h-zoom').textContent = this.map.getZoom().toFixed(2);
  }
};

/* ── Color helpers ── */
function wColor(ev) {
  ev = (ev||'').toLowerCase();
  if (ev.includes('tornado')) return '#ff1111';
  if (ev.includes('flash flood')) return '#00ff55';
  if (ev.includes('flood')) return '#00cc44';
  if (ev.includes('severe thunderstorm')) return '#ff8800';
  if (ev.includes('thunderstorm')) return '#ffbb00';
  if (ev.includes('hurricane')||ev.includes('tropical')) return '#dd00ff';
  if (ev.includes('winter')||ev.includes('snow')||ev.includes('blizzard')||ev.includes('ice')) return '#88aaff';
  if (ev.includes('fire')||ev.includes('red flag')) return '#ffdd00';
  if (ev.includes('wind')) return '#ffee44';
  return '#99ccff';
}

function wTitleClass(ev) {
  ev = (ev||'').toLowerCase();
  if (ev.includes('tornado')&&ev.includes('warning')) return 'wt-tor';
  if (ev.includes('tornado')) return 'wt-tow';
  if (ev.includes('severe thunderstorm')&&ev.includes('warning')) return 'wt-svr';
  if (ev.includes('severe thunderstorm')) return 'wt-svw';
  if (ev.includes('flash flood')&&ev.includes('warning')) return 'wt-ffw';
  if (ev.includes('flash flood')) return 'wt-ffa';
  if (ev.includes('flood')) return 'wt-fly';
  if (ev.includes('hurricane')||ev.includes('tropical')) return 'wt-hur';
  if (ev.includes('winter')||ev.includes('snow')||ev.includes('blizzard')||ev.includes('ice')) return 'wt-win';
  if (ev.includes('fire')||ev.includes('red flag')) return 'wt-fire';
  return 'wt-def';
}

function wBodyClass(ev) {
  ev = (ev||'').toLowerCase();
  if (ev.includes('tornado')&&ev.includes('warning')) return 'wb-tor';
  if (ev.includes('tornado')) return 'wb-tow';
  if (ev.includes('severe thunderstorm')&&ev.includes('warning')) return 'wb-svr';
  if (ev.includes('severe thunderstorm')) return 'wb-svw';
  if (ev.includes('flash flood')&&ev.includes('warning')) return 'wb-ffw';
  if (ev.includes('flash flood')) return 'wb-ffa';
  if (ev.includes('flood')) return 'wb-fly';
  if (ev.includes('hurricane')||ev.includes('tropical')) return 'wb-hur';
  if (ev.includes('winter')||ev.includes('snow')||ev.includes('blizzard')||ev.includes('ice')) return 'wb-win';
  if (ev.includes('fire')||ev.includes('red flag')) return 'wb-fire';
  return 'wb-def';
}

function setMsg(msg) {
  document.getElementById('loader-sub').textContent = msg;
}

App.init();
</script>
</body>
</html>
